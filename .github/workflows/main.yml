name: Monitor TJMA

on:
  schedule:
    - cron: '0 11 * * *' 
  workflow_dispatch:

jobs:
  verificar_site:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar o repositório
      uses: actions/checkout@v4

    - name: 2. Preparar o ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar as ferramentas de leitura
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. Acordar o Robô Rastreador
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python monitor_tjma.py

    - name: 5. Salvar novos dados (se houver mudança)
      run: |
        git config --global user.name 'Robô do Guia'
        git config --global user.email 'actions@github.com'
        if [ -f memoria_tjma.json ]; then
          git add memoria_tjma.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Atualização automática"
          git push
        else
          echo "Nenhum arquivo novo para salvar. Tudo certo!"
        fi
