name: Monitor TJMA

# Quando o robô deve trabalhar?
on:
  schedule:
    # Roda todo dia às 11h UTC (08h da manhã no horário de Brasília)
    - cron: '0 11 * * *' 
  workflow_dispatch: # Adiciona um botão para você rodar manualmente quando quiser testar!

jobs:
  verificar_site:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar o repositório
      uses: actions/checkout@v4

    - name: 2. Preparar o ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalar as ferramentas de leitura
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. Acordar o Robô Rastreador
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python monitor_tjma.py

    - name: 5. Salvar novos dados (se houver mudança)
      run: |
        git config --global user.name 'Robô do Guia'
        git config --global user.email 'actions@github.com'
        git add memoria_tjma.json
        # O comando abaixo verifica se o arquivo json foi modificado. Se foi, ele salva (commit).
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Atualização automática: Dados do TJMA alterados"
        git push
